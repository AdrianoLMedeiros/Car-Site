<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheelers, o melhor lugar para vender seu carro</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h2>Venda seu carro com a Wheelers: fácil, rápido e seguro!</h2>
    </header>

    <div class="main-container">
      <div class="form-container">
        <div class="form-title">Preencha os dados do seu carro:</div>
        <form action="">
          <div class="form-row">
            <div class="form-field">
              <label for="maker">Fabricante:</label>
              <input
                type="text"
                id="maker"
                name="maker"
                placeholder="Escolha o fabricante de seu carro"
                required
              />
            </div>

            <div class="form-field">
              <label for="model">Modelo:</label>
              <input
                type="text"
                id="model"
                name="model"
                placeholder="Escolha o modelo de seu carro"
                required
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="year-model">Ano-Modelo:</label>
              <input
                type="number"
                id="year-model"
                name="year-model"
                placeholder="Digite o ano-modelo do seu carro"
                required
              />
            </div>

            <div class="form-field">
              <label for="year-manufacture">Ano de fabricação:</label>
              <input
                type="number"
                id="year-manufacture"
                name="year-manufacture"
                placeholder="Digite o ano de fabricação do seu carro"
                required
              />
            </div>
          </div>
          <div class="form-submit">
            <button class="button" type="reset">
              Limpar os dados digitados
            </button>
            <button class="button" type="submit">Cadastre o seu anúncio</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 - Wheelers.com - Todos os direitos reservados</p>
    </footer>
  </body>
</html>
